<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bridg · Stream</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#06080e;--s1:rgba(255,255,255,.055);--s2:rgba(255,255,255,.09);
  --b:rgba(255,255,255,.1);--b2:rgba(255,255,255,.18);
  --blue:#4f8ef7;--violet:#7c5cfc;--glow:rgba(79,142,247,.3);
  --text:#eef2ff;--muted:rgba(200,215,255,.5);--cw:300px;
}
html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
body{background:
  radial-gradient(ellipse 70% 50% at 15% -5%,rgba(79,142,247,.14),transparent),
  radial-gradient(ellipse 55% 45% at 85% 110%,rgba(124,92,252,.12),transparent),var(--bg);}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}
.glass{background:var(--s1);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--b);}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:100;height:58px;display:flex;align-items:center;
  padding:0 16px;gap:10px;background:rgba(6,8,14,.8);backdrop-filter:blur(24px);border-bottom:1px solid var(--b);}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:21px;cursor:pointer;flex-shrink:0;
  background:linear-gradient(135deg,var(--blue),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hnav{display:flex;gap:2px;}
.htab{padding:5px 12px;border-radius:20px;font-size:13px;cursor:pointer;color:var(--muted);
  transition:.2s;background:none;border:none;font-family:'Outfit',sans-serif;}
.htab:hover,.htab.on{color:var(--text);background:var(--s1);}
.hsrch{flex:1;position:relative;max-width:280px;}
.hsrch input{width:100%;background:var(--s1);border:1px solid var(--b);border-radius:22px;
  padding:7px 12px 7px 32px;color:var(--text);font-size:13px;outline:none;font-family:'Outfit',sans-serif;transition:.2s;}
.hsrch input:focus{border-color:var(--blue);}
.hsrch i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px;}
.chatbtn{display:flex;align-items:center;gap:6px;background:var(--s1);border:1px solid var(--b);
  border-radius:20px;padding:5px 12px;font-size:13px;cursor:pointer;color:var(--text);transition:.2s;}
.chatbtn:hover{background:var(--s2);}
.cbadge{background:var(--blue);border-radius:8px;padding:1px 6px;font-size:10px;font-weight:700;min-width:18px;text-align:center;}

/* PAGES */
.page{display:none;min-height:100vh;padding-top:58px;}
.page.on{display:block;animation:fup .3s ease both;}
@keyframes fup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* HERO */
.hero{height:380px;position:relative;display:flex;align-items:flex-end;padding:32px 20px;overflow:hidden;}
.hbg{position:absolute;inset:0;overflow:hidden;}
.hbg-img{width:100%;height:100%;object-fit:cover;opacity:.45;display:none;}
.hbg-col{position:absolute;inset:0;background:linear-gradient(135deg,#091232,#1a0b3a,#0b1d3a);}
.hgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(79,142,247,.06)1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,.06)1px,transparent 1px);background-size:44px 44px;animation:gs 25s linear infinite;}
@keyframes gs{from{background-position:0 0}to{background-position:44px 44px}}
.horb{position:absolute;border-radius:50%;filter:blur(60px);}
.horb1{width:260px;height:260px;background:rgba(79,142,247,.22);top:-40px;right:5%;}
.horb2{width:170px;height:170px;background:rgba(124,92,252,.18);bottom:0;left:10%;}
.hfade{position:absolute;inset:0;background:linear-gradient(to top,var(--bg),transparent 55%);}
.hcont{position:relative;z-index:2;}
.hlabel{font-size:11px;color:var(--blue);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.htitle{font-family:'Syne',sans-serif;font-size:clamp(32px,7vw,60px);font-weight:800;line-height:.95;
  letter-spacing:-1.5px;margin-bottom:8px;color:#fff;}
.hdesc{font-size:13px;color:var(--muted);max-width:280px;line-height:1.6;margin-bottom:16px;}
.hbtns{display:flex;gap:8px;flex-wrap:wrap;}
.bplay{background:linear-gradient(135deg,var(--blue),var(--violet));border:none;border-radius:26px;
  padding:10px 22px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;
  display:flex;align-items:center;gap:7px;transition:.2s;box-shadow:0 4px 18px var(--glow);}
.bplay:hover{transform:translateY(-2px);box-shadow:0 7px 28px var(--glow);}
.binfo{background:var(--s1);backdrop-filter:blur(12px);border:1px solid var(--b);border-radius:26px;
  padding:10px 18px;color:var(--text);font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;
  display:flex;align-items:center;gap:7px;transition:.2s;}
.binfo:hover{background:var(--s2);}

/* SECTIONS */
.sec{padding:0 18px 28px;}
.stit{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.stit small{color:var(--muted);font-size:11px;font-weight:400;font-family:'Outfit',sans-serif;}
.divl{height:1px;background:linear-gradient(90deg,transparent,var(--b),transparent);margin:2px 18px 26px;}

/* HORIZ SCROLL */
.hsw{position:relative;}
.hs{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;scroll-behavior:smooth;}
.hs::-webkit-scrollbar{height:0;}
.hsbtn{position:absolute;top:50%;transform:translateY(-50%);z-index:10;width:32px;height:32px;border-radius:50%;
  background:var(--s2);backdrop-filter:blur(10px);border:1px solid var(--b);color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:11px;transition:.2s;}
.hsbtn:hover{background:rgba(79,142,247,.25);}
.hsbtn.l{left:-8px;}.hsbtn.r{right:-8px;}

/* CONTENT CARDS */
.cc{flex:0 0 150px;border-radius:12px;overflow:hidden;cursor:pointer;transition:.25s;position:relative;}
.cc:hover{transform:scale(1.05);}
.ccimg{height:210px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.ccimg img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;display:none;}
.ccfb{font-size:42px;position:relative;z-index:1;}
.ccov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85),transparent 55%);}
.ccinf{position:absolute;bottom:0;left:0;right:0;padding:10px;}
.cctit{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;line-height:1.2;}
.ccsub{font-size:10px;color:rgba(200,215,255,.6);margin-top:2px;}
.cctag{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);border-radius:4px;padding:2px 6px;font-size:9px;text-transform:uppercase;letter-spacing:.5px;}
.col1{background:linear-gradient(135deg,#1a1a4e,#2a1a5e);}
.col2{background:linear-gradient(135deg,#1a3020,#0a2818);}
.col3{background:linear-gradient(135deg,#2e1a1a,#3d1010);}
.col4{background:linear-gradient(135deg,#1a2a3e,#0a1830);}
.col5{background:linear-gradient(135deg,#2a1a3e,#1a0a2e);}
.col6{background:linear-gradient(135deg,#1a3a2a,#0a2a1a);}

/* GRID */
.ggrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.gc{border-radius:12px;overflow:hidden;cursor:pointer;transition:.2s;position:relative;}
.gc:hover{transform:translateY(-3px);}
.gcimg{height:125px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.gcimg img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;display:none;}
.gcfb{font-size:32px;position:relative;z-index:1;}
.gcb{padding:9px 12px;}
.gctit{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gcsub{font-size:11px;color:var(--muted);margin-top:2px;}

/* DETAIL */
.detbd{height:240px;position:relative;overflow:hidden;}
.detbdbg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.detbdbg img{width:100%;height:100%;object-fit:cover;display:none;}
.detbdfb{font-size:80px;opacity:.15;position:absolute;}
.detbdfade{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,8,14,.2),var(--bg));}
.detinf{padding:0 18px;margin-top:-60px;position:relative;}
.detrow{display:flex;gap:12px;align-items:flex-end;}
.detp{width:85px;height:128px;border-radius:10px;overflow:hidden;flex-shrink:0;box-shadow:0 8px 26px rgba(0,0,0,.6);position:relative;display:flex;align-items:center;justify-content:center;}
.detp img{width:100%;height:100%;object-fit:cover;display:none;position:absolute;inset:0;}
.detpfb{font-size:32px;}
.detm{flex:1;padding-bottom:4px;}
.dettit{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1.1;}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.badge{background:var(--s1);border:1px solid var(--b);border-radius:20px;padding:3px 9px;font-size:11px;}
.badge.ac{background:rgba(79,142,247,.15);border-color:rgba(79,142,247,.4);color:var(--blue);}
.detdesc{padding:14px 18px;font-size:13px;line-height:1.75;color:rgba(200,215,255,.8);}
.castsec{padding:0 18px 16px;}
.castrow{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;}
.castrow::-webkit-scrollbar{height:0;}
.cc2{background:var(--s1);border:1px solid var(--b);border-radius:22px;padding:5px 12px;font-size:12px;
  white-space:nowrap;flex-shrink:0;cursor:pointer;transition:.2s;}
.cc2:hover{border-color:var(--blue);background:rgba(79,142,247,.1);}
.playwrap{padding:0 18px 18px;}
.bplaybig{width:100%;background:linear-gradient(135deg,var(--blue),var(--violet));border:none;border-radius:12px;
  padding:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:9px;transition:.2s;box-shadow:0 4px 20px var(--glow);}
.bplaybig:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--glow);}

/* TV */
.stabs{display:flex;gap:6px;padding:0 18px 12px;overflow-x:auto;}
.stab{background:var(--s1);border:1px solid var(--b);border-radius:20px;padding:5px 13px;font-size:12px;
  cursor:pointer;color:var(--muted);white-space:nowrap;transition:.2s;font-family:'Outfit',sans-serif;}
.stab.on{background:rgba(79,142,247,.15);border-color:var(--blue);color:var(--text);}
.eplist{padding:0 18px;display:flex;flex-direction:column;gap:7px;margin-bottom:18px;}
.epc{border-radius:10px;padding:11px;display:flex;gap:11px;align-items:center;cursor:pointer;transition:.2s;}
.epc:hover{background:var(--s2);}
.epn{width:34px;height:34px;border-radius:8px;background:var(--s2);display:flex;align-items:center;
  justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;flex-shrink:0;color:var(--blue);}
.epb{flex:1;}
.ept{font-size:13px;font-weight:600;}
.epd{font-size:11px;color:var(--muted);margin-top:2px;}
.epsub{font-size:11px;color:var(--muted);flex-shrink:0;}

/* BROWSE */
.bsbar{padding:16px;position:sticky;top:58px;z-index:50;background:rgba(6,8,14,.88);backdrop-filter:blur(12px);}
.bsinp{position:relative;}
.bsinp input{width:100%;background:var(--s1);border:1px solid var(--b);border-radius:12px;
  padding:12px 12px 12px 40px;color:var(--text);font-size:14px;outline:none;font-family:'Outfit',sans-serif;transition:.2s;}
.bsinp input:focus{border-color:var(--blue);}
.bsinp i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);}
.phd{padding:20px 18px 0;}
.phd h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.cchip{display:inline-block;background:var(--s2);border:1px solid var(--b);border-radius:20px;padding:2px 10px;
  font-size:11px;color:var(--muted);margin-left:8px;vertical-align:middle;}
.resgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 18px 30px;}
.empty-st{text-align:center;padding:50px 18px;color:var(--muted);grid-column:span 2;}
.empty-st i{font-size:36px;margin-bottom:10px;display:block;opacity:.3;}
.empty-st h3{font-family:'Syne',sans-serif;font-size:17px;color:var(--text);margin-bottom:6px;}

/* WATCH */
#pg-watch{background:#000;padding-top:0;}
.whead{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:10px;padding:13px 16px;
  background:linear-gradient(to bottom,rgba(0,0,0,.88),transparent);}
.wback{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:13px;transition:.2s;}
.wback:hover{background:rgba(255,255,255,.2);}
.wtit{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#fff;}
.vwrap{position:relative;width:100%;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;}
video#mainvid{width:100%;height:100%;object-fit:contain;}
.novid{position:absolute;text-align:center;color:rgba(255,255,255,.45);padding:40px;}
.novid i{font-size:44px;margin-bottom:12px;display:block;opacity:.25;}
.novid p{font-size:13px;line-height:1.6;}
.vspinner{position:absolute;width:50px;height:50px;border-radius:50%;border:2px solid rgba(255,255,255,.15);
  border-top-color:var(--blue);animation:spin .8s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
.vctrl{position:absolute;bottom:0;left:0;right:0;padding:16px;
  background:linear-gradient(to top,rgba(0,0,0,.88),transparent);opacity:0;transition:.3s;}
.vwrap:hover .vctrl{opacity:1;}
.vprog{height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin-bottom:12px;cursor:pointer;}
.vprogf{height:100%;background:linear-gradient(90deg,var(--blue),var(--violet));border-radius:2px;width:0%;transition:width .5s;}
.vcrow{display:flex;align-items:center;gap:11px;}
.vcbtn{background:none;border:none;color:#fff;font-size:15px;cursor:pointer;padding:3px;transition:.2s;}
.vcbtn:hover{color:var(--blue);}
.vtime{font-size:12px;color:rgba(255,255,255,.6);font-family:'Outfit',sans-serif;}
.vqlbl{margin-left:auto;background:rgba(79,142,247,.25);border:1px solid rgba(79,142,247,.4);border-radius:5px;padding:2px 7px;font-size:11px;color:var(--blue);}

/* CHAT */
.chat-panel{position:fixed;right:0;top:0;bottom:0;width:var(--cw);z-index:150;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.chat-panel.open{transform:translateX(0);}
.chh{height:58px;display:flex;align-items:center;padding:0 13px;gap:9px;border-bottom:1px solid var(--b);
  flex-shrink:0;background:rgba(6,8,14,.95);backdrop-filter:blur(20px);}
.chhtit{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;flex:1;}
.chx{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:3px;transition:.2s;}
.chx:hover{color:var(--text);}
.chrooms{display:flex;gap:4px;padding:7px 9px;border-bottom:1px solid var(--b);overflow-x:auto;flex-shrink:0;background:rgba(6,8,14,.85);}
.chrooms::-webkit-scrollbar{height:0;}
.rtab{background:none;border:1px solid var(--b);border-radius:20px;padding:3px 9px;font-size:11px;
  color:var(--muted);cursor:pointer;white-space:nowrap;transition:.2s;font-family:'Outfit',sans-serif;}
.rtab.on{background:rgba(79,142,247,.15);border-color:var(--blue);color:var(--text);}
.chonline{padding:5px 11px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--b);flex-shrink:0;}
.chonline span{color:#4ade80;}
.chmsgs{flex:1;overflow-y:auto;padding:9px;display:flex;flex-direction:column;gap:7px;
  background:rgba(6,8,14,.7);backdrop-filter:blur(20px);}
.msg{display:flex;flex-direction:column;gap:2px;}
.mhd{display:flex;align-items:center;gap:5px;}
.mname{font-size:11px;font-weight:700;color:var(--blue);}
.mtime{font-size:10px;color:var(--muted);}
.mbbl{background:var(--s1);border:1px solid var(--b);border-radius:0 9px 9px 9px;padding:7px 10px;font-size:13px;line-height:1.5;max-width:92%;word-break:break-word;}
.msg.me .mbbl{background:rgba(79,142,247,.14);border-color:rgba(79,142,247,.3);border-radius:9px 0 9px 9px;align-self:flex-end;}
.msg.me{align-items:flex-end;}
.msg.me .mhd{flex-direction:row-reverse;}
.msg.me .mname{color:var(--violet);}
.chinp{padding:9px;border-top:1px solid var(--b);background:rgba(6,8,14,.95);backdrop-filter:blur(20px);flex-shrink:0;}
.myname{font-size:11px;color:var(--muted);margin-bottom:5px;}
.myname b{color:var(--blue);}
.chrow{display:flex;gap:6px;}
.chinput{flex:1;background:var(--s1);border:1px solid var(--b);border-radius:21px;padding:8px 13px;
  color:var(--text);font-size:13px;outline:none;font-family:'Outfit',sans-serif;transition:.2s;}
.chinput:focus{border-color:var(--blue);}
.chsend{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--violet));
  border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;transition:.2s;}
.chsend:hover{transform:scale(1.1);}

#toasts{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none;display:flex;flex-direction:column;gap:5px;}
.toast{background:rgba(10,14,28,.96);border:1px solid var(--b);border-radius:9px;padding:9px 14px;font-size:13px;animation:tin .3s ease;max-width:280px;text-align:center;}
@keyframes tin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:480px){:root{--cw:100vw;}}
</style>
</head>
<body>

<header class="glass">
  <div class="logo" onclick="goHome()">Bridg</div>
  <div class="hnav">
    <button class="htab on" id="tabhome" onclick="goHome()">Home</button>
    <button class="htab" id="tabbrowse" onclick="goBrowse()">Browse</button>
  </div>
  <div class="hsrch">
    <i class="fa fa-search"></i>
    <input type="text" id="hsrchi" placeholder="Search..." oninput="headerSrch(this.value)">
  </div>
  <div class="hright">
    <button class="chatbtn" onclick="toggleChat()">
      <i class="fa fa-comments"></i>
      <span class="cbadge" id="cbadge">0</span>
    </button>
  </div>
</header>

<!-- HOME -->
<div class="page on" id="pg-home">
  <div class="hero">
    <div class="hbg">
      <div class="hbg-col" id="hbgcol"></div>
      <div class="hgrid"></div>
      <div class="horb horb1"></div><div class="horb horb2"></div>
      <img id="hbgimg" alt="">
      <div class="hfade"></div>
    </div>
    <div class="hcont">
      <div class="hlabel" id="hlabel">Featured</div>
      <div class="htitle" id="htitle">Nothing here yet</div>
      <div class="hdesc" id="hdesc">Add content in the admin panel to start streaming.</div>
      <div class="hbtns" id="hbtns" style="display:none;">
        <button class="bplay" id="hplay"><i class="fa fa-play"></i> Play Now</button>
        <button class="binfo" id="hinfo"><i class="fa fa-circle-info"></i> Details</button>
      </div>
    </div>
  </div>
  <div id="homesecs"></div>
</div>

<!-- BROWSE -->
<div class="page" id="pg-browse">
  <div class="bsbar">
    <div class="bsinp"><i class="fa fa-search"></i><input type="text" id="bsinput" placeholder="Search titles, genres, cast..." oninput="doSearch(this.value)"></div>
  </div>
  <div class="phd"><h1>All Content <span class="cchip" id="rescnt">0 titles</span></h1></div>
  <div class="resgrid" id="resgrid"></div>
</div>

<!-- MOVIE DETAIL -->
<div class="page" id="pg-detail">
  <div class="detbd">
    <div class="detbdbg" id="dbdbg"><div class="detbdfb" id="dbdfb">🎬</div></div>
    <div class="detbdfade"></div>
  </div>
  <div class="detinf">
    <div class="detrow">
      <div class="detp" id="dtp"><div class="detpfb" id="dtpfb">🎬</div></div>
      <div class="detm">

<script>
// ── IndexedDB (same DB as admin) ──
let _db=null;
async function getDB(){
  if(_db)return _db;
  return new Promise((res,rej)=>{
    const r=indexedDB.open('bridg_db',2);
    r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('blobs'))db.createObjectStore('blobs');};
    r.onsuccess=e=>{_db=e.target.result;res(_db);};
    r.onerror=e=>rej(new Error('IDB: '+e.target.error));
  });
}
async function dbGet(k){
  if(!k)return null;
  try{
    const db=await getDB();
    return new Promise((res,rej)=>{
      const tx=db.transaction('blobs','readonly');
      const r=tx.objectStore('blobs').get(k);
      r.onsuccess=e=>res(e.target.result||null);
      r.onerror=e=>rej(e);
    });
  }catch{return null;}
}

const MK='bridg_meta_v3';
function getMeta(){try{return JSON.parse(localStorage.getItem(MK)||'[]');}catch{return [];}}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

const COLS=['col1','col2','col3','col4','col5','col6'];
function colFor(id){return COLS[id.split('').reduce((a,c)=>a+c.charCodeAt(0),0)%COLS.length];}

// URL cache
const UC={};
async function blobUrl(key){
  if(!key)return null;
  if(UC[key])return UC[key];
  const blob=await dbGet(key);
  if(!blob)return null;
  const url=URL.createObjectURL(blob);
  UC[key]=url;return url;
}

// Apply image to element
async function applyImg(key,el,fb){
  if(!key){setFb(el,fb);return;}
  const url=await blobUrl(key);
  if(url){
    let img=el.querySelector('img');
    if(!img){img=document.createElement('img');el.appendChild(img);}
    img.src=url;img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;';
    const f=el.querySelector('.ccfb,.gcfb,.detpfb,.detbdfb');
    if(f)f.style.display='none';
  }else setFb(el,fb);
}
function setFb(el,text){const f=el.querySelector('.ccfb,.gcfb,.detpfb,.detbdfb');if(f)f.textContent=text||'🎬';}

// ── Navigation ──
let curPage='pg-home',wBackTo='pg-home',curDetId=null,curSeason=1;
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  curPage=id;
  document.querySelector('header').style.display=id==='pg-watch'?'none':'flex';
  document.querySelectorAll('.htab').forEach(t=>t.classList.remove('on'));
  if(id==='pg-home')document.getElementById('tabhome').classList.add('on');
  if(id==='pg-browse')document.getElementById('tabbrowse').classList.add('on');
  window.scrollTo(0,0);
}
function goHome(){renderHome();showPage('pg-home');}
function goBrowse(){doSearch('');showPage('pg-browse');}
function headerSrch(v){if(v.trim()){goBrowse();setTimeout(()=>{document.getElementById('bsinput').value=v;doSearch(v);},40);}}

// ── HOME ──
async function renderHome(){
  const all=getMeta();
  if(!all.length){
    document.getElementById('htitle').textContent='Nothing here yet';
    document.getElementById('hdesc').textContent='Open admin-panel.html to add content.';
    document.getElementById('hbtns').style.display='none';
    document.getElementById('homesecs').innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--muted);">
      <div style="font-size:40px;margin-bottom:12px;opacity:.3;">🎬</div>
      <div style="font-family:'Syne',sans-serif;font-size:18px;color:var(--text);margin-bottom:6px;">No content yet</div>
      <div style="font-size:13px;">Add movies or TV shows from the admin panel.</div>
    </div>`;return;
  }
  // Hero
  const hero=all[0];
  document.getElementById('htitle').textContent=hero.title;
  document.getElementById('hdesc').textContent=(hero.description||'').slice(0,110)||'Click to watch.';
  document.getElementById('hbtns').style.display='flex';
  document.getElementById('hlabel').textContent=hero.type==='tv'?'TV Show · Featured':'Movie · Featured';
  document.getElementById('hplay').onclick=()=>goWatch(hero.id);
  document.getElementById('hinfo').onclick=()=>goDetail(hero.id,hero.type);
  if(hero.backdropKey){const url=await blobUrl(hero.backdropKey);if(url){const i=document.getElementById('hbgimg');i.src=url;i.style.display='block';}}
  document.getElementById('hbgcol').className='hbg-col '+colFor(hero.id);

  // Sections
  const movies=all.filter(c=>c.type==='movie');
  const shows=all.filter(c=>c.type==='tv');
  let html='';
  if(all.length>1)html+=buildSec('All Titles',all,'all');
  if(movies.length)html+=buildSec('Movies',movies,'mov');
  if(shows.length)html+=buildSec('TV Shows',shows,'tv');
  document.getElementById('homesecs').innerHTML=html;
  // Load images async
  all.forEach(c=>{
    const el=document.getElementById('hcard-'+c.id);
    if(el)applyImg(c.posterKey,el,'🎬');
  });
}

function buildSec(tit,items,key){
  return `<div class="sec" style="padding-top:${key==='all'?26:0}px;">
    <div class="stit">${tit} <small>${items.length}</small></div>
    <div class="hsw">
      <div class="hs" id="hs-${key}">
        ${items.map(c=>`
          <div class="cc glass" onclick="goDetail('${c.id}','${c.type}')">
            <div class="ccimg ${colFor(c.id)}" id="hcard-${c.id}"><span class="ccfb">🎬</span><div class="ccov"></div></div>
            <div class="cctag">${c.type==='tv'?'TV':'MOVIE'}</div>
            <div class="ccinf"><div class="cctit">${esc(c.title)}</div><div class="ccsub">${c.year||''}${c.rating?' · '+c.rating:''}</div></div>
          </div>
        `).join('')}
      </div>
      <button class="hsbtn l" onclick="scrollHS('hs-${key}',-180)"><i class="fa fa-chevron-left"></i></button>
      <button class="hsbtn r" onclick="scrollHS('hs-${key}',180)"><i class="fa fa-chevron-right"></i></button>
    </div>
  </div><div class="divl"></div>`;
}
function scrollHS(id,d){document.getElementById(id).scrollBy({left:d,behavior:'smooth'});}

// ── BROWSE/SEARCH ──
function doSearch(q){
  const all=getMeta();
  const lq=q.trim().toLowerCase();
  const f=lq?all.filter(c=>c.title?.toLowerCase().includes(lq)||(c.genres||[]).join(' ').toLowerCase().includes(lq)||(c.cast||[]).join(' ').toLowerCase().includes(lq)||(c.description||'').toLowerCase().includes(lq)):all;
  document.getElementById('rescnt').textContent=f.length+' title'+(f.length!==1?'s':'');
  const grid=document.getElementById('resgrid');
  if(!f.length){grid.innerHTML=`<div class="empty-st"><i class="fa fa-search"></i><h3>No results</h3><p>Try a different term.</p></div>`;return;}
  grid.innerHTML=f.map(c=>`
    <div class="gc glass" onclick="goDetail('${c.id}','${c.type}')">
      <div class="gcimg ${colFor(c.id)}" id="bc-${c.id}"><span class="gcfb">🎬</span></div>
      <div class="gcb"><div class="gctit">${esc(c.title)}</div><div class="gcsub">${c.year||''} · ${c.type==='tv'?'TV Show':'Movie'}${c.rating?' · '+c.rating:''}</div></div>
    </div>
  `).join('');
  f.forEach(c=>{const el=document.getElementById('bc-'+c.id);if(el)applyImg(c.posterKey,el,'🎬');});
}

// ── DETAIL ──
async function goDetail(id,type){
  if(type==='tv'){goTV(id);return;}
  const c=getMeta().find(x=>x.id===id);
  if(!c){toast('Content not found');return;}
  curDetId=id;wBackTo='pg-detail';

  // Backdrop
  const bdbg=document.getElementById('dbdbg');
  bdbg.className='detbdbg '+colFor(id);
  document.getElementById('dbdfb').textContent='🎬';
  if(c.backdropKey){const url=await blobUrl(c.backdropKey);if(url){bdbg.style.backgroundImage=`url(${url})`;bdbg.style.backgroundSize='cover';bdbg.style.backgroundPosition='center';document.getElementById('dbdfb').style.display='none';}}
  else{bdbg.style.backgroundImage='';document.getElementById('dbdfb').style.display='';}

  // Poster
  const dtp=document.getElementById('dtp');
  dtp.className='detp '+colFor(id);
  document.getElementById('dtpfb').textContent='🎬';
  document.getElementById('dtpfb').style.display='';
  if(c.posterKey){const url=await blobUrl(c.posterKey);if(url){
    let img=dtp.querySelector('img');if(!img){img=document.createElement('img');dtp.appendChild(img);}
    img.src=url;img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;';
    document.getElementById('dtpfb').style.display='none';
  }}

  document.getElementById('dttit').textContent=c.title;
  document.getElementById('dtdesc').textContent=c.description||'';
  document.getElementById('dtbadges').innerHTML=[
    c.year&&`<span class="badge">${c.year}</span>`,
    c.duration&&`<span class="badge">${c.duration} min</span>`,
    c.rating&&`<span class="badge ac">${c.rating}</span>`,
    ...(c.genres||[]).map(g=>`<span class="badge">${esc(g)}</span>`)
  ].filter(Boolean).join('');

  const castrow=document.getElementById('dcastrow');
  castrow.innerHTML=(c.cast||[]).map(a=>`<div class="cc2" onclick="goBrowse();setTimeout(()=>{document.getElementById('bsinput').value='${esc(a)}';doSearch('${esc(a)}');},50);">${esc(a)}</div>`).join('');
  document.getElementById('dcastsec').style.display=(c.cast||[]).length?'block':'none';
  document.getElementById('ddirname').textContent=c.director||'—';
  document.getElementById('ddirsec').style.display=c.director?'block':'none';
  document.getElementById('dtplaybtn').onclick=()=>goWatch(id);

  // More like this
  const sim=getMeta().filter(x=>x.id!==id&&(x.genres||[]).some(g=>(c.genres||[]).includes(g))).slice(0,4);
  const ms=document.getElementById('moresec');
  if(sim.length){
    ms.style.display='block';
    document.getElementById('moreg').innerHTML=sim.map(s=>`
      <div class="gc glass" onclick="goDetail('${s.id}','${s.type}')">
        <div class="gcimg ${colFor(s.id)}" id="sim-${s.id}"><span class="gcfb">🎬</span></div>
        <div class="gcb"><div class="gctit">${esc(s.title)}</div><div class="gcsub">${s.year||''}</div></div>
      </div>
    `).join('');
    sim.forEach(s=>{const el=document.getElementById('sim-'+s.id);if(el)applyImg(s.posterKey,el,'🎬');});
  }else ms.style.display='none';
  showPage('pg-detail');
}

// ── TV SHOW ──
async function goTV(id){
  const c=getMeta().find(x=>x.id===id);if(!c)return;
  curDetId=id;curSeason=1;wBackTo='pg-tv';
  const bdbg=document.getElementById('tvbdbg');
  bdbg.className='detbdbg '+colFor(id);
  document.getElementById('tvbdfb').textContent='📺';
  if(c.backdropKey){const url=await blobUrl(c.backdropKey);if(url){bdbg.style.backgroundImage=`url(${url})`;bdbg.style.backgroundSize='cover';bdbg.style.backgroundPosition='center';document.getElementById('tvbdfb').style.display='none';}else{bdbg.style.backgroundImage='';document.getElementById('tvbdfb').style.display='';}}
  else{bdbg.style.backgroundImage='';document.getElementById('tvbdfb').style.display='';}
  const tvdtp=document.getElementById('tvdtp');
  tvdtp.className='detp '+colFor(id);
  document.getElementById('tvdtpfb').textContent='📺';
  document.getElementById('tvdtpfb').style.display='';
  if(c.posterKey){const url=await blobUrl(c.posterKey);if(url){let img=tvdtp.querySelector('img');if(!img){img=document.createElement('img');tvdtp.appendChild(img);}img.src=url;img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;';document.getElementById('tvdtpfb').style.display='none';}}
  document.getElementById('tvtit').textContent=c.title;
  document.getElementById('tvdesc').textContent=c.description||'';
  document.getElementById('tvbadges').innerHTML=[c.year&&`<span class="badge">${c.year}</span>`,c.rating&&`<span class="badge ac">${c.rating}</span>`,...(c.genres||[]).map(g=>`<span class="badge">${esc(g)}</span>`)].filter(Boolean).join('');
  renderSTabs(c);showPage('pg-tv');
}

function renderSTabs(c){
  const seasons=c?(c.seasons||[]):[];
  const tabs=document.getElementById('tvstabs');
  if(!seasons.length){tabs.innerHTML='<span style="color:var(--muted);font-size:13px;padding:0 18px;">No episodes added yet.</span>';document.getElementById('eplist').innerHTML='';return;}
  tabs.innerHTML=seasons.map(s=>`<button class="stab ${s.num===curSeason?'on':''}" onclick="selSeason(${s.num})">${'Season '+s.num}</button>`).join('');
  const first=seasons.find(s=>s.num===curSeason)||seasons[0];
  if(first)renderEpList(first.episodes||[]);
}

function selSeason(n){
  curSeason=n;
  const c=getMeta().find(x=>x.id===curDetId);if(!c)return;
  document.querySelectorAll('.stab').forEach(t=>t.classList.toggle('on',+t.textContent.replace('Season ','')===n));
  const season=(c.seasons||[]).find(s=>s.num===n);
  renderEpList(season?season.episodes:[]);
}

function renderEpList(episodes){
  const list=document.getElementById('eplist');
  const sorted=[...episodes].sort((a,b)=>a.num-b.num);
  if(!sorted.length){list.innerHTML='<div style="color:var(--muted);font-size:13px;padding:0 18px;">No episodes in this season.</div>';return;}
  list.innerHTML=sorted.map(ep=>`
    <div class="epc glass" onclick="goWatchEp('${curDetId}','${ep.id}')">
      <div class="epn">E${ep.num}</div>
      <div class="epb"><div class="ept">${esc(ep.title||'Untitled')}</div><div class="epd">${esc(ep.description||'')}</div></div>
      <div class="epsub">${ep.duration?ep.duration+'m':'—'}</div>
      <i class="fa fa-play" style="color:var(--blue);font-size:11px;margin-left:6px;"></i>
    </div>
  `).join('');
}

// ── WATCH ──
async function goWatch(id){
  const c=getMeta().find(x=>x.id===id);if(!c){toast('Not found');return;}
  document.getElementById('wtit').textContent=c.title;
  document.getElementById('wbackbtn').onclick=()=>showPage(wBackTo||'pg-home');
  document.getElementById('vqlbl').textContent=c.rating||'HD';
  await loadVideo(c.videoKey);
  showPage('pg-watch');
}

async function goWatchEp(showId,epId){
  const show=getMeta().find(x=>x.id===showId);if(!show)return;
  let ep=null;
  for(const s of show.seasons||[])for(const e of s.episodes||[])if(e.id===epId){ep=e;break;}
  if(!ep){toast('Episode not found');return;}
  document.getElementById('wtit').textContent=show.title+' — E'+ep.num+': '+ep.title;
  document.getElementById('wbackbtn').onclick=()=>showPage('pg-tv');
  document.getElementById('vqlbl').textContent=ep.duration?ep.duration+'m':'HD';
  await loadVideo(ep.videoKey);
  showPage('pg-watch');
}

async function loadVideo(videoKey){
  const vid=document.getElementById('mainvid');
  const novid=document.getElementById('novid');
  const spinner=document.getElementById('vspinner');
  vid.pause();vid.src='';vid.load();
  novid.style.display='none';vid.style.display='block';
  if(!videoKey){vid.style.display='none';novid.style.display='block';setupVidEvents();return;}
  spinner.style.display='block';
  const url=await blobUrl(videoKey);
  spinner.style.display='none';
  if(url){vid.src=url;vid.load();vid.play().catch(()=>{});}
  else{vid.style.display='none';novid.style.display='block';}
  setupVidEvents();
}

function setupVidEvents(){
  const vid=document.getElementById('mainvid');
  const fill=document.getElementById('vprogf');
  const timeEl=document.getElementById('vtime');
  function fmt(s){const m=Math.floor(s/60),ss=Math.floor(s%60);return m+':'+(ss<10?'0':'')+ss;}
  vid.ontimeupdate=()=>{if(vid.duration){fill.style.width=(vid.currentTime/vid.duration*100)+'%';timeEl.textContent=fmt(vid.currentTime)+' / '+fmt(vid.duration);}};
  vid.onplay=()=>{document.getElementById('playicn').innerHTML='<i class="fa fa-pause"></i>';};
  vid.onpause=()=>{document.getElementById('playicn').innerHTML='<i class="fa fa-play"></i>';};
}

function togglePlay(){const v=document.getElementById('mainvid');v.paused?v.play():v.pause();}
function seekVid(e){const b=document.getElementById('vprog');const v=document.getElementById('mainvid');if(!v.duration)return;const r=b.getBoundingClientRect();v.currentTime=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*v.duration;}
function toggleFS(){const w=document.getElementById('mainvid');document.fullscreenElement?document.exitFullscreen():w.requestFullscreen&&w.requestFullscreen();}

// ── CHAT ──
let chatOpen=false,curRoom='global',newMsgCt=0;
const chatMsgs={global:[],movies:[],shows:[]};
const myUser='Guest#'+Math.floor(1000+Math.random()*9000);
document.getElementById('myname').textContent=myUser;

function toggleChat(){
  chatOpen=!chatOpen;
  document.getElementById('chatpanel').classList.toggle('open',chatOpen);
  if(chatOpen){newMsgCt=0;document.getElementById('cbadge').textContent=0;renderMsgs();setTimeout(scrollMsgs,50);}
}

function switchRoom(room,btn){
  curRoom=room;
  document.querySelectorAll('.rtab').forEach(t=>t.classList.remove('on'));
  if(btn)btn.classList.add('on');
  renderMsgs();
}

function renderMsgs(){
  const msgs=chatMsgs[curRoom]||[];
  const c=document.getElementById('chmsgs');
  if(!msgs.length){c.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">No messages yet. Say something!</div>';return;}
  c.innerHTML=msgs.map(m=>`
    <div class="msg ${m.own?'me':''}">
      <div class="mhd"><span class="mname">${esc(m.own?'You':m.name)}</span><span class="mtime">${esc(m.time)}</span></div>
      <div class="mbbl">${esc(m.content)}</div>
    </div>
  `).join('');
  scrollMsgs();
}

function scrollMsgs(){const c=document.getElementById('chmsgs');c.scrollTop=c.scrollHeight;}

function sendMsg(){
  const inp=document.getElementById('chinput');const content=inp.value.trim();
  if(!content)return;
  if(!chatMsgs[curRoom])chatMsgs[curRoom]=[];
  chatMsgs[curRoom].push({name:myUser,content,own:true,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  inp.value='';renderMsgs();
  try{
    const saved=JSON.parse(localStorage.getItem('bridg_chat_v2')||'{}');
    for(const r in chatMsgs)saved[r]=(chatMsgs[r]||[]).slice(-100);
    localStorage.setItem('bridg_chat_v2',JSON.stringify(saved));
  }catch{}
}

// Sync chat from other tabs
function syncChat(){
  try{
    const saved=JSON.parse(localStorage.getItem('bridg_chat_v2')||'{}');
    for(const r in saved)chatMsgs[r]=(saved[r]||[]).map(m=>({...m,own:m.name===myUser}));
    if(chatOpen)renderMsgs();
  }catch{}
}
setInterval(syncChat,2000);

// Online count from distinct names
setInterval(()=>{
  const all=Object.values(chatMsgs).flat();
  const names=new Set(all.map(m=>m.name));
  document.getElementById('onlinect').textContent=Math.max(1,names.size);
},5000);

// Toast
function toast(msg){
  const w=document.getElementById('toasts');const el=document.createElement('div');
  el.className='toast glass';el.textContent=msg;w.appendChild(el);setTimeout(()=>el.remove(),3000);
}

// ── INIT ──
syncChat();
renderHome();

// Reload when admin adds content
window.addEventListener('storage',e=>{
  if(e.key===MK){Object.keys(UC).forEach(k=>delete UC[k]);if(curPage==='pg-home')renderHome();}
  if(e.key==='bridg_chat_v2')syncChat();
});
</script>
